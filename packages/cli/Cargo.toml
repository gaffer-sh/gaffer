[package]
name = "gaffer"
version = "0.1.1"
edition = "2021"
publish = false
description = "Test analytics and intelligence CLI"
license = "MIT"
repository = "https://github.com/gaffer-sh/gaffer"
homepage = "https://gaffer.sh"

[[bin]]
name = "gaffer"
path = "src/main.rs"

[dependencies]
gaffer-core = { path = "../gaffer-core" }
clap = { version = "4.5", features = [
  "derive",
  "env"
] }
serde = { version = "1", features = [ "derive" ] }
toml = "0.8"
colored = "3"
anyhow = "1"
glob = "0.3"
ignore = "0.4"
dialoguer = "0.11"
open = "5"
ureq = { version = "3", features = [ "json" ] }
serde_json = "1"
tempfile = { version = "3", optional = true }

[dev-dependencies]
tempfile = "3"

[features]
default = []
