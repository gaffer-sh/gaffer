[package]
name = "gaffer-core"
version = "0.1.0"
edition = "2021"
publish = false
description = "Core library for Gaffer test analytics"
license = "MIT"
repository = "https://github.com/gaffer-sh/gaffer"
homepage = "https://gaffer.sh"

[lib]
crate-type = [ "rlib" ]

[dependencies]
rusqlite = { version = "0.32", features = [ "bundled" ] }
serde = { version = "1", features = [ "derive" ] }
serde_json = "1"
uuid = { version = "1", features = [ "v4" ] }
chrono = { version = "0.4", features = [ "serde" ] }
regex = "1"
ureq = { version = "3", features = [ "json" ] }
thiserror = "2"
gaffer-parsers = { path = "../gaffer-parsers" }

[dev-dependencies]
tempfile = "3"
