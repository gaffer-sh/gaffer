[package]
name = "gaffer-parsers"
version = "0.1.0"
edition = "2021"
publish = false
description = "Test report and coverage parsers for Gaffer"
license = "MIT"
repository = "https://github.com/gaffer-sh/gaffer"
homepage = "https://gaffer.sh"

[lib]
crate-type = [
  "cdylib",
  "rlib"
]

[dependencies]
quick-xml = "0.37"
serde = { version = "1", features = [ "derive" ] }
serde_json = "1"
wasm-bindgen = "0.2"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
